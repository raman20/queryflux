name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'website/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'website/**'
      - 'docs/**'
      - '*.md'

# One active run per ref: new pushes cancel older in-progress runs on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN_VERSION: "1.91.1"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # libduckdb-sys: point at system-installed lib so rust-lld resolves -lduckdb reliably.
  # The "Install libduckdb" step in each job puts the .so + headers there.
  DUCKDB_LIB_DIR: /usr/local/lib
  DUCKDB_INCLUDE_DIR: /usr/local/include
  # Must match duckdb crate version: duckdb 1.85.1 → libduckdb-sys 1.10501.0 → DuckDB v1.5.1.
  DUCKDB_VERSION: "1.5.1"
  # libduckdb-linux-amd64.zip for DUCKDB_VERSION (verify when bumping version).
  DUCKDB_LIBDUCKDB_LINUX_AMD64_SHA256: "21aec66a60eae1696270ba715a481ab066a88d99a62718d0577579ac1a7a4834"

jobs:
  # Fast, no PyO3 / no compile — runs in parallel with clippy + unit tests.
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5
      - uses: dtolnay/rust-toolchain@d8352f6b1d2e870bc5716e7a6d9b65c4cc244a1a
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: rustfmt
      - run: cargo fmt --all -- --check

  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5
        with:
          persist-credentials: false
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
      - run: make helm-check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Install libduckdb
        run: bash scripts/install-libduckdb.sh

      - uses: dtolnay/rust-toolchain@d8352f6b1d2e870bc5716e7a6d9b65c4cc244a1a
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: queryflux
          cache-on-failure: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python venv (sqlglot / PyO3)
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
          echo "PYO3_PYTHON=${GITHUB_WORKSPACE}/.venv/bin/python3" >> "$GITHUB_ENV"
          echo "PYTHONPATH=$(.venv/bin/python3 -c 'import site; print(site.getsitepackages()[0])')" >> "$GITHUB_ENV"

      # Exclude queryflux-bench: duplicate link of main stack; benchmark.yml builds it.
      - run: cargo clippy --workspace --all-targets --all-features --exclude queryflux-bench -- -D warnings

  unit-test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      - name: Install libduckdb
        run: bash scripts/install-libduckdb.sh

      - uses: dtolnay/rust-toolchain@d8352f6b1d2e870bc5716e7a6d9b65c4cc244a1a
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: queryflux
          cache-on-failure: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python venv (sqlglot / PyO3)
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
          echo "PYO3_PYTHON=${GITHUB_WORKSPACE}/.venv/bin/python3" >> "$GITHUB_ENV"
          echo "PYTHONPATH=$(.venv/bin/python3 -c 'import site; print(site.getsitepackages()[0])')" >> "$GITHUB_ENV"

      - name: Unit & integration tests (make test)
        run: make test

  e2e:
    name: E2E tests (Docker)
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@44c2b7a8a4ea60a981eaca3cf939b5f4305c123b # v4.1.5

      # StarRocks all-in-one + Trino + Lakekeeper stack needs many GB of layer space;
      # default ubuntu-latest root FS often fills during `docker compose pull`.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Install libduckdb
        run: bash scripts/install-libduckdb.sh

      - uses: dtolnay/rust-toolchain@d8352f6b1d2e870bc5716e7a6d9b65c4cc244a1a
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN_VERSION }}

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: queryflux
          cache-on-failure: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python venv (sqlglot / PyO3)
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements.txt
          echo "PYO3_PYTHON=${GITHUB_WORKSPACE}/.venv/bin/python3" >> "$GITHUB_ENV"
          echo "PYTHONPATH=$(.venv/bin/python3 -c 'import site; print(site.getsitepackages()[0])')" >> "$GITHUB_ENV"

      - name: Install Trino ADBC driver (dbc)
        run: |
          bash scripts/install-adbc-trino-driver.sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      # Same stack as `make test-e2e`, but split so "Engine logs" / `compose down` still run if `cargo test` fails.
      - name: Start e2e Docker stack (Trino + StarRocks + sentinel)
        run: |
          docker compose -f docker/docker-compose.test.yml --project-directory . up -d --wait --wait-timeout 300 trino starrocks sentinel

      - name: E2E tests (queryflux-e2e-tests)
        env:
          TRINO_URL: http://localhost:18081
          TRINO_ADBC_URI: http://localhost:18081
          STARROCKS_URL: mysql://root@localhost:9030
          LAKEKEEPER_URL: http://localhost:18181
          MINIO_ENDPOINT: localhost:19000
        run: |
          cargo test -p queryflux-e2e-tests --manifest-path Cargo.toml -- --test-threads=1 --include-ignored

      - name: Engine logs (debug on failure)
        if: failure()
        run: |
          docker compose -f docker/docker-compose.test.yml --project-directory . logs --no-color --tail=200 trino || true
          docker compose -f docker/docker-compose.test.yml --project-directory . logs --no-color --tail=200 starrocks || true

      - name: Stop e2e Docker stack
        if: always()
        run: docker compose -f docker/docker-compose.test.yml --project-directory . down
