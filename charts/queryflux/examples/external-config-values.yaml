# Use this when another system owns QueryFlux config and admin credentials.
config:
  create: false
  existingConfigMap: queryflux-config
  # If the config contains secrets (e.g. a Postgres URL with a password), put
  # config.yaml in a Secret instead and set existingSecret; it takes precedence
  # over existingConfigMap:
  #   existingSecret: queryflux-config
  fileName: config.yaml

existingSecret:
  name: queryflux-admin
  usernameKey: QUERYFLUX_ADMIN_USER
  passwordKey: QUERYFLUX_ADMIN_PASSWORD

image:
  tag: latest-slim

service:
  ports:
    studio:
      enabled: false
