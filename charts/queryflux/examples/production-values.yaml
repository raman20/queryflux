# Production-oriented example. Replace hosts, TLS secret, and backend endpoints.
replicaCount: 2

image:
  tag: latest
  pullPolicy: IfNotPresent

adminCredentials:
  username: admin
  password: change-this-before-installing

# NOTE: config.data is rendered into a ConfigMap, so any secret embedded here
# (such as the Postgres password in persistence.url) is stored in plaintext.
# QueryFlux does not interpolate environment variables into the config file, so
# for production put the full config (including the Postgres URL) into a Secret
# and reference it instead:
#   config:
#     create: false
#     existingSecret: queryflux-config   # Secret with a config.yaml key
config:
  data:
    queryflux:
      externalAddress: https://queryflux.example.com
      frontends:
        trinoHttp:
          enabled: true
          port: 8080
      persistence:
        type: postgres
        # Placeholder — replace USERNAME/PASSWORD/HOST. Prefer config.existingSecret
        # (see note above) so credentials are not stored in plaintext.
        url: postgres://USERNAME:PASSWORD@postgres.queryflux.svc.cluster.local:5432/queryflux
      adminApi:
        port: 9000
      queryHistoryRetentionDays: 30
    clusterGroups:
      trino-default:
        engine: trino
        maxRunningQueries: 100
        clusters:
          - name: trino-1
            endpoint: http://trino.trino.svc.cluster.local:8080
    routers:
      - type: protocolBased
        trinoHttp: trino-default
    routingFallback: trino-default

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
  hosts:
    - host: queryflux.example.com
      paths:
        - path: /
          pathType: Prefix
          servicePortName: trino-http
    - host: queryflux-studio.example.com
      paths:
        - path: /
          pathType: Prefix
          servicePortName: studio
  tls:
    - secretName: queryflux-tls
      hosts:
        - queryflux.example.com
        - queryflux-studio.example.com

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

pdb:
  enabled: true
  maxUnavailable: 1

serviceMonitor:
  enabled: true
  labels:
    release: prometheus

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 8080
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 2Gi

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: queryflux
