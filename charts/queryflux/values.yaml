replicaCount: 1

image:
  repository: ghcr.io/lakeops-org/queryflux
  pullPolicy: IfNotPresent
  # Overrides the image tag. Defaults to the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

args:
  - --config
  - /etc/queryflux/config.yaml

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

adminCredentials:
  username: admin
  # Leave empty to generate a release-local password in a Secret.
  password: ""

existingSecret:
  name: ""
  usernameKey: QUERYFLUX_ADMIN_USER
  passwordKey: QUERYFLUX_ADMIN_PASSWORD

config:
  create: true
  # Mount config.yaml from a pre-created ConfigMap (set create: false).
  existingConfigMap: ""
  # Mount config.yaml from a pre-created Secret instead of a ConfigMap. Use this
  # when the config contains sensitive values (e.g. a Postgres URL with a
  # password), since the rendered config is mounted verbatim and QueryFlux does
  # not interpolate environment variables into the config file. Takes precedence
  # over existingConfigMap and config.create.
  existingSecret: ""
  mountPath: /etc/queryflux
  fileName: config.yaml
  data:
    queryflux:
      externalAddress: 'http://{{ include "queryflux.fullname" . }}:8080'
      frontends:
        trinoHttp:
          enabled: true
          port: 8080
      persistence:
        type: inMemory
      adminApi:
        port: 9000
    clusterGroups:
      duckdb-local:
        engine: duckDb
        maxRunningQueries: 4
        clusters:
          - name: duckdb-1
    translation:
      errorOnUnsupported: false
    routers:
      - type: protocolBased
        trinoHttp: duckdb-local
    routingFallback: duckdb-local

service:
  type: ClusterIP
  annotations: {}
  ports:
    trinoHttp:
      enabled: true
      name: trino-http
      port: 8080
      targetPort: 8080
      protocol: TCP
    admin:
      enabled: true
      name: admin
      port: 9000
      targetPort: 9000
      protocol: TCP
    studio:
      enabled: true
      name: studio
      port: 3000
      targetPort: 3000
      protocol: TCP
    postgresWire:
      enabled: false
      name: postgres-wire
      port: 5432
      targetPort: 5432
      protocol: TCP
    mysqlWire:
      enabled: false
      name: mysql-wire
      port: 3306
      targetPort: 3306
      protocol: TCP
    snowflakeHttp:
      enabled: false
      name: snowflake-http
      port: 8443
      targetPort: 8443
      protocol: TCP
    flightSql:
      enabled: false
      name: flight-sql
      port: 32010
      targetPort: 32010
      protocol: TCP

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: queryflux.local
      paths:
        - path: /
          pathType: Prefix
          servicePortName: trino-http
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

livenessProbe:
  httpGet:
    path: /health
    port: admin
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /health
    port: admin
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 6

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: null

pdb:
  enabled: false
  minAvailable: null
  maxUnavailable: 1

networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []

serviceMonitor:
  enabled: false
  namespace: ""
  labels: {}
  annotations: {}
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  port: admin

env: []
envFrom: []
extraVolumes: []
extraVolumeMounts: []
extraContainers: []
lifecycle: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
