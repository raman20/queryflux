{{- if not .Values.existingSecret.name }}
{{- $secretName := include "queryflux.secretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := .Values.adminCredentials.password -}}
{{- if and (not $password) $existing (hasKey $existing.data .Values.existingSecret.passwordKey) -}}
{{- $password = (index $existing.data .Values.existingSecret.passwordKey | b64dec) -}}
{{- end -}}
{{- if not $password -}}
{{- $password = randAlphaNum 32 -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "queryflux.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.existingSecret.usernameKey }}: {{ .Values.adminCredentials.username | quote }}
  {{ .Values.existingSecret.passwordKey }}: {{ $password | quote }}
{{- end }}
