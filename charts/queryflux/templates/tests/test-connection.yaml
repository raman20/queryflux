apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "queryflux.fullname" . }}-test-connection"
  labels:
    {{- include "queryflux.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  securityContext:
    {{- toYaml .Values.podSecurityContext | nindent 4 }}
  containers:
    - name: wget
      image: busybox:1.37.0
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      command:
        - wget
      args:
        - -qO-
        - "http://{{ include "queryflux.fullname" . }}:{{ .Values.service.ports.admin.port }}/health"
